# =====================================================
# Cloudflare Worker 配置
# 项目：cf推广统计 (cf-tuiguang-tongji)
# =====================================================

name = "cf-tuiguang-tongji"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# =====================================================
# 定时触发：每 5 分钟推进一次同步
# 同步通讯录是“分批”同步，依赖 cron 推进
# =====================================================
[triggers]
crons = ["*/5 * * * *"]

# =====================================================
# 静态资源（Workers Static Assets）
# 指向 ./public 目录
# =====================================================
[assets]
directory = "./public"
binding = "ASSETS"

# =====================================================
# D1 数据库
# 创建命令：wrangler d1 create cf-tuiguang-tongji
# 把输出里的 database_id 填到下面
# =====================================================
[[d1_databases]]
binding = "DB"
database_name = "cf-tuiguang-tongji"
database_id = "a05c9648-b5ae-4265-8cd0-8abf051bff95"
migrations_dir = "migrations"

# =====================================================
# R2 对象存储（二维码图片）
# 创建命令：wrangler r2 bucket create cf-tuiguang-qr
# =====================================================
[[r2_buckets]]
binding = "QR_BUCKET"
bucket_name = "cf-tuiguang-qr"

# =====================================================
# KV 缓存（access_token 等）
# 创建命令：wrangler kv namespace create KV
# 把输出里的 id 填到下面
# =====================================================
[[kv_namespaces]]
binding = "KV"
id = "667dd80c38ef4c3d9633ccf6b469c42f"

# =====================================================
# 非敏感环境变量
# =====================================================
[vars]
DEFAULT_MESSAGE_TYPE = "work_notification"
SHORT_URL_BASE = "https://tuiguang.7kk.top"

# =====================================================
# 敏感环境变量（用 wrangler secret put 配置）
#   wrangler secret put AGENT_API_KEY
#   wrangler secret put SESSION_SECRET
#   wrangler secret put DINGTALK_CORP_ID
#   wrangler secret put DINGTALK_APP_KEY
#   wrangler secret put DINGTALK_APP_SECRET
#   wrangler secret put DINGTALK_AGENT_ID
# =====================================================

# =====================================================
# 开发环境（wrangler dev）
# 可在 .dev.vars 里覆盖
# =====================================================
[env.dev]
[env.dev.vars]
SHORT_URL_BASE = "http://localhost:8787"
DEFAULT_MESSAGE_TYPE = "work_notification"
